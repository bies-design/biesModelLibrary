services:
#=================
#PostgresSQL 16
#=================
    db:
        container_name: PostgresSQL
        image: postgres:16
        ports:
            - ${POSTGRESDB_PORT}:${POSTGRESDB_PORT}
        environment:
            POSTGRES_USER: ${POSTGRESDB_USER}
            POSTGRES_PASSWORD: ${POSTGRESDB_PASSWORD}
            POSTGRES_DB: ${POSTGRESDB_DB}
        networks:
            modlib:
                aliases:
                    - modlib.pgsql
        volumes:
            - pgdata_local:/var/lib/postgresql/data # 資料庫存檔位置
        restart: always
#=================
#minio
#=================
    minio:
        container_name: minio-local
        image: minio/minio:latest
        command: server /data --console-address ":"${S3_CONSOLE_PORT}
        ports:
            - ${S3_PORT}:${S3_PORT} # 程式連線用 (API)
            - ${S3_CONSOLE_PORT}:${S3_CONSOLE_PORT} # 你看介面用 (Console)
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
        networks:
            modlib:
                aliases:
                    - modlib.minio
        volumes:
            - minio_data_local:/data # 檔案存檔位置
        restart: always


#=================
# Redis
#=================
    redis:
        container_name: redis-local
        image: redis:alpine #輕量版
        ports:
            - ${REDIS_PORT}:${REDIS_PORT} # 讓你的 worker.js 可以透過 localhost:6379 連線
        # 開啟 AOF 持久化，防止重開機後 Queue 裡的任務消失
        command: redis-server --appendonly yes #開啟 AOF (Append Only File)，讓 Redis 把資料寫入硬碟。這樣如果你的電腦重開機，排隊中的轉檔任務不會消失。
        networks:
            modlib:
                aliases:
                    - modlib.redis
        volumes:
            - redis_data_local:/data
        restart: always

#=================
# Frontend
#=================
    frontend:
        container_name: frontend-local
        build: 
            context: .
            dockerfile: ./Dockerfile
        image: biescloudtechsupport/node:24.0-slim
        working_dir: /usr/local
        command: bash -c "booting frontend_init.sh dev"
        networks:
            modlib:
                aliases:
                    - modlib.frontend 
        ports:
            - ${FRONTEND_PORT}:${FRONTEND_PORT}
        depends_on:
            - tus-server
        env_file:
            - ./.env
        volumes: 
            - ./:/usr/local/app
            # use empty anonymous volume to avoid not relating code changes in host to container
            - /usr/local/app/ifcToFragsConvertWorker
            - /usr/local/app/tus-server
        restart: unless-stopped

#=================
# Tus-Server
#=================
    tus-server:
        container_name: tus-server-local
        image: biescloudtechsupport/node:24.0-slim
        working_dir: /usr/local
        command: bash -c "booting tus-server_init.sh dev"
        networks:
            modlib:
                aliases:
                    - modlib.tus-server
        ports:
            - ${TUS_SERVER_PORT}:${TUS_SERVER_PORT}
        depends_on:
            - db
            - minio
            - redis
        env_file:
            - ./.env
        volumes: 
            - ./tus-server:/usr/local/app
            - ./prisma:/usr/local/prisma
        restart: unless-stopped


#=================
# Worker: IFC to Fragments Converter
#=================
    ifcToFragsConvertWorker:
        container_name: ifcToFragsConvertWorker-local
        image: biescloudtechsupport/node:24.0-slim
        working_dir: /usr/local
        command: bash -c "booting ifcToFragsConvertWorker_init.sh dev"
        networks:
            modlib:
                aliases:
                    - modlib.worker 
        ports:
            - ${IFC_FRAGS_CONVERT_WORKER_PORT}:${IFC_FRAGS_CONVERT_WORKER_PORT}
        depends_on:
            - tus-server
        env_file:
            - ./.env
        volumes: 
            - ./ifcToFragsConvertWorker:/usr/local/app
            - ./prisma:/usr/local/prisma
        restart: unless-stopped



# 確保資料不會因為重開機消失
# 資料持久化到 Docker Volum
volumes:
    pgdata_local:
    minio_data_local:
    redis_data_local:
#執行 docker-compose --env-file .env.local up -d
#-d means Detached mode 在背景執行這些容器，不要佔用我的終端機（Terminal）畫面
networks:
    modlib:
        name: modlib-bridge
        driver: bridge
        attachable: true